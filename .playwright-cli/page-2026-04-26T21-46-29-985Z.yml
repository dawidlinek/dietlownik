                        - paragraph [ref=e178]:
                            - text: Dietly.pl to największa, najdokładniejsza i najbardziej aktualna porównywarka cateringów dietetycznych w Polsce. Do tej pory, odchudzając się na dietach pudełkowych, byliśmy skazani na monotonne poszukiwanie stron cateringów dietetycznych. Musieliśmy znaleźć catering, upewnić się, że ma w ofercie odpowiadającą nam dietę, sprawdzić czy zostanie dowieziona do naszej miejscowości, a na końcu poczytać opinie - czy to w wyszukiwarce, czy na Facebooku. Proces poszukiwania cateringu dietetycznego dostosowanego do naszych potrzeb był długi i monotonny. Ponadto, do momentu spróbowania, nie byliśmy pewni tego, co otrzymamy, ani jaka będzie jakość pudełek dietetycznych.
